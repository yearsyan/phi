name: Build Android release

on:
  push:

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-release:
    name: Signed Android release APK
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            flutter/android/**/*.gradle*
            flutter/android/gradle/wrapper/gradle-wrapper.properties

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true

      - name: Install Flutter dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Build signed release APK
        working-directory: flutter
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/phi-android-release.jks
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${ANDROID_RELEASE_KEYSTORE_BASE64:?missing Android release keystore}"
          : "${ANDROID_RELEASE_STORE_PASSWORD:?missing Android release store password}"
          : "${ANDROID_RELEASE_KEY_ALIAS:?missing Android release key alias}"
          : "${ANDROID_RELEASE_KEY_PASSWORD:?missing Android release key password}"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" \
            | base64 --decode > "$ANDROID_RELEASE_KEYSTORE_PATH"
          chmod 600 "$ANDROID_RELEASE_KEYSTORE_PATH"
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/phi-client-android-release.apk

      - name: Verify APK signature
        working-directory: flutter
        shell: bash
        run: |
          set -euo pipefail
          build_tools_version="$(ls -1 "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -n 1)"
          "$ANDROID_SDK_ROOT/build-tools/$build_tools_version/apksigner" verify \
            --verbose \
            --print-certs \
            build/app/outputs/flutter-apk/phi-client-android-release.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: phi-client-android-release.apk
          path: flutter/build/app/outputs/flutter-apk/phi-client-android-release.apk
          if-no-files-found: error
          archive: false
