name: Build daemon binaries

on:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  macos-arm64:
    name: macOS ARM64
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Build phi-daemon
        run: cargo +stable build --locked --release --package phi-daemon --bin phi-daemon

      - name: Prepare executable
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/phi-daemon dist/phi-daemon
          chmod 755 dist/phi-daemon
          architectures="$(lipo -archs dist/phi-daemon)"
          [[ "$architectures" == "arm64" ]]

      - name: Check Apple signing configuration
        id: signing
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          values=(
            "$MACOS_CERTIFICATE_P12_BASE64"
            "$MACOS_CERTIFICATE_PASSWORD"
            "$APPLE_API_KEY_P8_BASE64"
            "$APPLE_API_KEY_ID"
            "$APPLE_API_ISSUER_ID"
          )
          configured=0
          for value in "${values[@]}"; do
            if [[ -n "$value" ]]; then
              ((configured += 1))
            fi
          done

          if [[ "$configured" -eq 0 ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "suffix=-unsigned" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple signing secrets are not configured; publishing an ad-hoc-signed artifact for trusted internal testing only."
          elif [[ "$configured" -ne "${#values[@]}" ]]; then
            echo "::error::Apple signing is only partially configured. Set all five documented macOS signing secrets, or remove all of them."
            exit 1
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign executable with Developer ID
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/phi-developer-id.p12"
          keychain_path="$RUNNER_TEMP/phi-signing.keychain-db"
          keychain_password="$(uuidgen)-$(uuidgen)"

          cleanup() {
            security delete-keychain "$keychain_path" >/dev/null 2>&1 || true
            rm -f "$certificate_path"
          }
          trap cleanup EXIT

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -t cert \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -k "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          signing_identity="$(
            security find-identity -v -p codesigning "$keychain_path" \
              | awk '/Developer ID Application/ { print $2; exit }'
          )"
          if [[ -z "$signing_identity" ]]; then
            echo "::error::The PKCS#12 secret does not contain a Developer ID Application identity."
            exit 1
          fi

          codesign \
            --force \
            --options runtime \
            --timestamp \
            --keychain "$keychain_path" \
            --sign "$signing_identity" \
            dist/phi-daemon
          codesign --verify --strict --verbose=2 dist/phi-daemon

      - name: Apply ad-hoc signature
        if: steps.signing.outputs.enabled != 'true'
        run: codesign --force --sign - dist/phi-daemon

      - name: Verify executable
        shell: bash
        run: |
          set -euo pipefail
          file dist/phi-daemon
          lipo -archs dist/phi-daemon
          vtool -show-build dist/phi-daemon
          otool -L dist/phi-daemon
          codesign --verify --strict --verbose=2 dist/phi-daemon

      - name: Package executable
        id: package
        shell: bash
        env:
          PACKAGE_SUFFIX: ${{ steps.signing.outputs.suffix }}
        run: |
          set -euo pipefail
          package_name="phi-daemon-macos-arm64${PACKAGE_SUFFIX}.zip"
          package_path="dist/$package_name"
          ditto -c -k dist/phi-daemon "$package_path"
          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "path=$package_path" >> "$GITHUB_OUTPUT"

      - name: Notarize executable
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        env:
          PACKAGE_PATH: ${{ steps.package.outputs.path }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          notary_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          cleanup() {
            rm -f "$notary_key_path"
          }
          trap cleanup EXIT

          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -D > "$notary_key_path"
          chmod 600 "$notary_key_path"
          xcrun notarytool submit "$PACKAGE_PATH" \
            --key "$notary_key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          spctl --assess --type execute --verbose=4 dist/phi-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.name }}
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error
          archive: false

  windows-x86-64:
    name: Windows x86_64
    runs-on: windows-2025
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Build phi-daemon
        run: cargo +stable build --locked --release --package phi-daemon --bin phi-daemon

      - name: Package executable
        shell: pwsh
        run: >-
          Compress-Archive
          -LiteralPath target/release/phi-daemon.exe
          -DestinationPath phi-daemon-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: phi-daemon-windows-x86_64.zip
          if-no-files-found: error
          archive: false
